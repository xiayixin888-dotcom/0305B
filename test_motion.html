<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React Motion Test</title>
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.3.1?dev",
            "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime?dev",
            "react-dom/client": "https://esm.sh/react-dom@18.3.1/client?dev",
            "motion/react": "https://esm.sh/motion@12.4.2/react?dev&external=react,react-dom"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion } from 'motion/react';

        function App() {
            return (
                <motion.div 
                    initial={{ opacity: 0 }} 
                    animate={{ opacity: 1 }} 
                    className="p-4 bg-blue-100"
                >
                    <h1 className="text-2xl font-bold">Motion Works!</h1>
                </motion.div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
